name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Register slash commands
        run: node dist/deploy-commands.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}

      - name: Open SSH port for this runner
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "Runner IP: $RUNNER_IP"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${RUNNER_IP}/32 \
            --region ${{ secrets.AWS_REGION }} || true
          echo "RUNNER_IP=${RUNNER_IP}" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Copy build artifacts to EC2
        run: |
          # Write SSH key to temp file
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Sync built dist/, package.json, package-lock.json to EC2
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/discord-bot-music/dist/

          rsync -az \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            package.json package-lock.json ecosystem.config.js \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/discord-bot-music/

          rm -f /tmp/deploy_key

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/discord-bot-music

            echo ">>> Checking FFmpeg..."
            if ! command -v ffmpeg &> /dev/null; then
              echo "FFmpeg not found, installing..."
              sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
            else
              echo "FFmpeg already installed: $(ffmpeg -version 2>&1 | head -1)"
            fi

            echo ">>> Installing production dependencies..."
            npm ci --omit=dev

            echo ">>> Restarting PM2..."
            pm2 restart discord-music-bot || pm2 start ecosystem.config.js

            echo ">>> Deploy complete ✅"
            pm2 status

      - name: Close SSH port
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${RUNNER_IP}/32 \
            --region ${{ secrets.AWS_REGION }} || true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
